services:
  db:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: apgaming
      POSTGRES_PASSWORD: supersecretpassword
      POSTGRES_DB: apgaming
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
  maildev:
    image: maildev/maildev
    restart: unless-stopped
    ports:
      - '1080:1080'
      - '1025:1025'
volumes:
  postgres-data:
