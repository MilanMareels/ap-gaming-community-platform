services:
  db:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-apgaming}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-apgaming}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-apgaming}']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/milanmareels/ap-gaming-hub/backend:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-apgaming}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-apgaming}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?Set JWT_SECRET_KEY in .env}
      SESSION_SECRET_KEY: ${SESSION_SECRET_KEY:?Set SESSION_SECRET_KEY in .env}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:?Set GOOGLE_CLIENT_ID in .env}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:?Set GOOGLE_CLIENT_SECRET in .env}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-https://example.com/api/auth/google/callback}
      FRONTEND_URL: ${FRONTEND_URL:-https://example.com}
      NODE_ENV: production

  frontend:
    image: ghcr.io/milanmareels/ap-gaming-hub/frontend:latest
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      BACKEND_URL: http://backend:3000
      NODE_ENV: production

  nginx:
    image: ghcr.io/milanmareels/ap-gaming-hub/nginx:latest
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - '${PORT:-80}:80'

volumes:
  postgres-data:
